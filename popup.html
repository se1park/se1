<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Sound Booster</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>Tab Sound Booster</h1>
          <p id="tabTitle">Current tab</p>
        </div>
        <span id="statusDot" class="status-dot" aria-hidden="true"></span>
      </header>

      <section class="control">
        <div class="gain-row">
          <label for="gain">Boost</label>
          <output id="gainValue" for="gain">2.0x</output>
        </div>
        <div class="gain-controls">
          <input id="gain" type="range" min="1" max="5" step="0.1" value="2">
          <label class="number-label" for="gainNumber">
            <span>Value</span>
            <input id="gainNumber" type="number" min="1" max="5" step="0.1" value="2" inputmode="decimal">
          </label>
        </div>
      </section>

      <div class="actions">
        <button id="toggle" type="button">Start</button>
      </div>

      <p id="message" class="message" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
