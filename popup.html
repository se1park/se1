<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Sound Booster</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <span class="eyebrow">Current tab audio</span>
            <h1>Tab Sound Booster</h1>
          </div>
        </div>
        <div id="statusPill" class="status-pill">
          <span id="statusDot" class="status-dot" aria-hidden="true"></span>
          <span id="statusText">Idle</span>
        </div>
      </header>

      <section class="tab-card" aria-label="Selected tab">
        <div>
          <span class="section-label">Selected tab</span>
          <p id="tabTitle">Current tab</p>
        </div>
      </section>

      <section class="meter" aria-label="Boost amount">
        <div>
          <span class="section-label">Boost level</span>
          <output id="gainValue" for="gain">2.0x</output>
          <p class="meter-description">Use the wheel, slider, or number field.</p>
        </div>
        <div class="meter-ring" aria-hidden="true">
          <span id="meterValue">2.0</span>
        </div>
      </section>

      <section class="control">
        <div class="gain-row">
          <label for="gain">Fine tune</label>
          <span class="range-label">1x to 10x</span>
        </div>
        <div class="gain-controls">
          <input id="gain" type="range" min="1" max="10" step="0.1" value="2" aria-label="Boost amount">
          <label class="number-label" for="gainNumber">
            <span>Value</span>
            <input id="gainNumber" type="number" min="1" max="10" step="0.1" value="2" inputmode="decimal">
          </label>
        </div>
      </section>

      <div class="actions">
        <button id="toggle" type="button">
          <span class="button-icon" aria-hidden="true"></span>
          <span>Start</span>
        </button>
      </div>

      <p id="message" class="message" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
